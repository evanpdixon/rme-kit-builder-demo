// RENDERING
// ════════════════════════════════════════════
const allTasks = [...roadmapTasks, ...dashboardTasks];
let currentSource = 'all';

function setSource(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentSource = tab.dataset.source;
    render();
}

function getFilteredTasks() {
    let tasks = currentSource === 'all' ? allTasks :
                currentSource === 'roadmap' ? roadmapTasks : dashboardTasks;

    const search = document.getElementById('search').value.toLowerCase();
    const priority = document.getElementById('priority-filter').value;
    const category = document.getElementById('category-filter').value;

    if (search) {
        tasks = tasks.filter(t =>
            t.title.toLowerCase().includes(search) ||
            (t.detail && t.detail.toLowerCase().includes(search)) ||
            (t.category && t.category.toLowerCase().includes(search)) ||
            (t.phase && t.phase.toLowerCase().includes(search)) ||
            t.tags.some(tag => tag.toLowerCase().includes(search))
        );
    }
    if (priority !== 'all') {
        tasks = tasks.filter(t => t.priority === priority);
    }
    if (category !== 'all') {
        tasks = tasks.filter(t => (t.phase || t.category) === category);
    }
    return tasks;
}

function getGroupKey(task) {
    return task.phase || task.category || 'Ungrouped';
}

function render() {
    const tasks = getFilteredTasks();
    const container = document.getElementById('task-list');

    // Group by phase/category
    const groups = {};
    const groupOrder = [];
    tasks.forEach(t => {
        const key = getGroupKey(t);
        if (!groups[key]) { groups[key] = []; groupOrder.push(key); }
        groups[key].push(t);
    });

    // Sort tasks within groups: high > medium > low
    const prioOrder = { high: 0, medium: 1, low: 2 };
    Object.values(groups).forEach(arr => arr.sort((a, b) => prioOrder[a.priority] - prioOrder[b.priority]));

    let html = '';
    groupOrder.forEach(group => {
        const items = groups[group];
        const highCount = items.filter(t => t.priority === 'high').length;
        html += `<div class="phase-section">
            <div class="phase-header" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
                <h3>${escapeHtml(group)}</h3>
                <span class="badge">${items.length} task${items.length!==1?'s':''}${highCount ? ' · '+highCount+' high' : ''}</span>
            </div>
            <div class="phase-body">`;
        items.forEach(t => {
            html += `<div class="task-row">
                <div class="priority-dot ${t.priority}"></div>
                <div class="task-title">
                    ${escapeHtml(t.title)}
                    ${t.detail ? '<span class="task-detail">'+escapeHtml(t.detail)+'</span>' : ''}
                    <div class="tags">
                        <span class="tag">${t.source === 'roadmap' ? 'Roadmap' : 'Dashboard'}</span>
                        ${t.effort ? '<span class="tag">'+escapeHtml(t.effort)+'</span>' : ''}
                        ${t.tags.map(tag => '<span class="tag">'+escapeHtml(tag)+'</span>').join('')}
                    </div>
                </div>
            </div>`;
        });
        html += '</div></div>';
    });

    if (!tasks.length) {
        html = '<div style="text-align:center;padding:40px;color:#8b949e;">No tasks match your filters</div>';
    }

    container.innerHTML = html;

    // Update stats
    const visible = tasks;
    document.getElementById('stat-total').textContent = visible.length;
    document.getElementById('stat-high').textContent = visible.filter(t => t.priority === 'high').length;
    document.getElementById('stat-medium').textContent = visible.filter(t => t.priority === 'medium').length;
    document.getElementById('stat-low').textContent = visible.filter(t => t.priority === 'low').length;

    // Update category filter options
    updateCategoryFilter();
}

function updateCategoryFilter() {
    const select = document.getElementById('category-filter');
    const currentVal = select.value;
    const tasks = currentSource === 'all' ? allTasks :
                  currentSource === 'roadmap' ? roadmapTasks : dashboardTasks;
    const cats = [...new Set(tasks.map(t => t.phase || t.category))].sort();

    select.innerHTML = '<option value="all">All Categories</option>';
    cats.forEach(c => {
        select.innerHTML += `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`;
    });
    if (cats.includes(currentVal)) select.value = currentVal;
}

function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

// Init
document.getElementById('count-all').textContent = allTasks.length;
document.getElementById('count-roadmap').textContent = roadmapTasks.length;
document.getElementById('count-dashboard').textContent = dashboardTasks.length;
render();
</script>
